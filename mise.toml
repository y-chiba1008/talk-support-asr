[settings]
lockfile = true
python.uv_venv_auto = "create|source"

[tools]
node = "24"
uv = "latest"
pnpm = "latest"

[deps]
uv.auto = true

[env]
UV_PYTHON = "3.12"
ENV = "development"
LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED = "true"
LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT = "{{config_root}}/data"
LABEL_STUDIO_BASE_DATA_DIR = "{{config_root}}/label_studio_work/app_data"

[tasks."prepare:frontend"]
description = "frontend環境のパッケージをインストールする"
dir = "frontend"
run = "pnpm install"

[tasks."prepare:backend"]
description = "backend環境のパッケージをインストールする"
dir = "backend"
run = "uv sync"

[tasks.prepare]
description = "フロントとバックを一括でパッケージインストール"
depends = ["prepare:frontend", "prepare:backend"]

[tasks."dev:frontend"]
description = "React 開発サーバーを起動"
dir = "frontend"
run = "pnpm dev"

[tasks."dev:backend"]
description = "FastAPI 開発サーバーを起動"
dir = "backend"
run = "uv run uvicorn app.main:app --reload"

[tasks.dev]
description = "フロントとバックを一括起動"
depends = ["dev:frontend", "dev:backend"]

[tasks.label_studio]
description = "Label Stuidoサーバを起動"
dir = "label_studio_work"
run = "uv run label-studio start"